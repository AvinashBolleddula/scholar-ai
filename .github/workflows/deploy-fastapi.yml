name: Deploy FastAPI Client

on:
  push:
    branches: [main]
    paths:
      - 'fastapi-client/**'

env:
  REGION: us-central1
  SERVICE: fastapi-client
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fastapi-client-repo/fastapi-client:${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build
        run: docker build -t ${{ env.IMAGE }} ./fastapi-client

      - name: Push
        run: docker push ${{ env.IMAGE }}

      - name: Deploy
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --min-instances 2 \
            --max-instances 10 \
            --memory 2Gi \
            --port 8001 \
            --cpu 2 \
            --concurrency 80 \
            --timeout 150 \
            --set-env-vars="MCP_SERVER_URL=https://research-server-run-225547455314.us-central1.run.app/mcp,MCP_API_KEY=${{ secrets.MCP_API_KEY }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},FASTAPI_API_KEY=${{ secrets.FASTAPI_API_KEY }}"